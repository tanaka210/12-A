<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Sample</title>
    <link rel="stylesheet" href="6-3.css">
</head>
<body>
    <div class="container">
        <h2>`transform` プロパティのデモ</h2>

        <div class="example-group">
            <h3>移動 (`translate`)</h3>
            <div class="box box-translate"></div>
            <p>マウスホバーで横に移動します。</p>
        </div>

        <div class="example-group">
            <h3>拡大縮小 (`scale`)</h3>
            <div class="box box-scale"></div>
            <p>マウスホバーで拡大します。</p>
        </div>

        <div class="example-group">
            <h3>回転 (`rotate`)</h3>
            <div class="box box-rotate"></div>
            <p>マウスホバーで回転します。</p>
        </div>
    </div>
</body>
</html>
