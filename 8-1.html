<!DOCTYPE html>
<html>
<head>
<title>Flexboxでの垂直中央揃え</title>
<style>
.container {
  border: 1px solid #ccc;
  height: 100px;
  display: flex; /* Flexコンテナにする */
  align-items: center; /* 交差軸（垂直方向）の中央に配置 */
}

.item1 {
  height: 50px;
  background-color: lightblue;
  padding: 10px;
}

.item2 {
  height: 80px;
  background-color: lightcoral;
  padding: 10px;
}
</style>
</head>
<body>

<div class="container">
  <div class="item1">高さ50pxの要素</div>
  <div class="item2">高さ80pxの要素</div>
</div>

</body>
</html>
