<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,
        td,
        th {
            border: 1px solid black;
            border-collapse: collapse;
        }
</style>
</head>
<body>
    <table>
        <tr>
            <td>名前</td>
            <td>点数</td>
            </tr>
            <tr>
                <td>田中</td>
                <td>85</td>
            </tr>
        </table>
        <table>
            <thead>
                <tr>
                    <th>名前</th>
                    <th>点数</th>
                    </tr>
            </thead>
            <tbody>
                    <tr>
                        <td>田中</td>
                        <td>85</td>
                </tr>
                </tbody>S
        </table>
    <table>
        <tr>
            <td colspan="2">2列</td>
            </tr>
        <tr>
            <td>左</td>
            <td>右</td>
        </tr>
    </table>
    <table>
        <tr>
            <td rowspan="2">2行</td>
            <td>右上</td>
        </tr>
        <tr>
            <td>右下</td>
        </tr>
    </table>
</body>
</html>
