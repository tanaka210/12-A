<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Sub-Properties Sample</title>
    <link rel="stylesheet" href="6-2.css">
</head>
<body>
    <div class="container">
        <h2>`transition` サブプロパティのデモ</h2>

        <div class="example-group">
            <h3>プロパティとデュレーションの指定</h3>
            <div class="box box1">Width & BgColor</div>
            <p>マウスホバーで幅と背景色が変わります。<br>速度曲線はデフォルトです。</p>
        </div>

        <div class="example-group">
            <h3>タイミング関数（Easing）の比較</h3>
            <div class="box box2">Ease (Default)</div>
            <div class="box box3">Linear</div>
            <div class="box box4">Ease-in-out</div>
            <p>マウスホバーで幅が変わります。<br>それぞれのボックスの速度変化を比べてください。</p>
        </div>

        <div class="example-group">
            <h3>ディレイ（遅延）の指定</h3>
            <div class="box box5">Delay 0.5s</div>
            <p>マウスホバーで幅が変わります。<br>アニメーションが少し遅れて始まるのを確認してください。</p>
        </div>

    </div>
</body>
</html>
