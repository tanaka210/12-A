<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボックスモデルの学習</title>
    <style>
        .box {
            background-color: lightblue;
            margin-bottom: 20px; /* 箱と箱の間隔 */
        }
        .box1 {
            padding: 20px;
            border: 5px solid red;
        }
        .box2 {
            margin: 30px;
            border: 3px dashed green;
        }
        .box3 {
            padding: 10px 30px; /* 上下10px 左右30px */
            border: 2px dotted blue;
            margin: 10px 5px; /* 上下10px 左右5px */
        }
        .box4 {
            padding: 10px 30px; /* 上下10px 左右30px */
            border: 2px dotted yellow;
            margin: 10px 5px; /* 上下10px 左右5px */
        }
    </style>
</head>
<body>
    <div class="box box1">箱1</div>
    <div class="box box2">箱2</div>
    <div class="box box3">箱3
        <div class="box4">箱4</div>
    </div>
</body>
</html>
